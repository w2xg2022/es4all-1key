# ALSA 软件音量控制配置（es4all / Armbian 版本）
#
# 本机 HDMI 音频输出（card __CARD__）本身不带任何硬件混音器控件
# （amixer -c__CARD__ scontrols 为空），导致 EmulationStation 的
# VolumeControl::isAvailable() 始终返回 false，"音量设置"菜单
# （VOLUME 分组：系统音量、音乐音量、显示音量提示）不会出现。
#
# 通过 softvol 插件虚拟出一个名为 "PCM" 的混音器控件并挂载到
# card __CARD__ 的控件列表中，供 ES 与 amixer 使用，从而启用音量调节菜单。
#
# __CARD__ 会在 01-prep.sh 部署时替换为实际侦测到的 HDMI 音频 card 编号
# （不同板型编号不同，例如 MD1000 是 0、RK3318-Box 是 1）。
pcm.!default {
    type asym
    playback.pcm "playback"
    capture.pcm "plughw:__CARD__"
}
pcm.playback {
    type softvol
    slave.pcm "plughw:__CARD__,0"
    control {
        name "PCM"
        card __CARD__
    }
}
ctl.!default {
    type hw
    card __CARD__
}
