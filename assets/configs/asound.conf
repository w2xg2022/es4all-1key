# ALSA 软件音量控制配置（es4armbian / Armbian 版本）
#
# 本机 HDMI 音频输出（card 0）本身不带任何硬件混音器控件
# （amixer -c0 scontrols 为空），导致 EmulationStation 的
# VolumeControl::isAvailable() 始终返回 false，"音量设置"菜单
# （VOLUME 分组：系统音量、音乐音量、显示音量提示）不会出现。
#
# 通过 softvol 插件虚拟出一个名为 "PCM" 的混音器控件并挂载到
# card 0 的控件列表中，供 ES 与 amixer 使用，从而启用音量调节菜单。
pcm.!default {
    type asym
    playback.pcm "playback"
    capture.pcm "hw:0"
}
pcm.playback {
    type softvol
    slave.pcm "hw:0,0"
    control {
        name "PCM"
        card 0
    }
}
ctl.!default {
    type hw
    card 0
}
